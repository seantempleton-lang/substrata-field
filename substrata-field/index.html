// Rock core recovery — simplified field-first workflow

// Method → diameter auto-fill (null = open entry, no auto-fill)
const CORE_METHODS = [
  { v:"HA",    label:"HA",    diameter:null  },
  { v:"NDD",   label:"NDD",   diameter:null  },
  { v:"HQ",    label:"HQ",    diameter:64    },
  { v:"PQ",    label:"PQ",    diameter:85    },
  { v:"DT45",  label:"DT45",  diameter:114   },
  { v:"DP",    label:"DP",    diameter:null  },
  { v:"PT",    label:"PT",    diameter:null  },
  { v:"PS",    label:"PS",    diameter:null  },
  { v:"GP",    label:"GP",    diameter:null  },
];

const CORE_INIT = {
  Method:"", Diameter:"",
  top:"", base:"",
  TCRLength:"",
  DrillTime:"", Drivability:3,
  Remarks:"",
};

function calcPct(lengthMm, runLengthM) {
  if (!lengthMm || !runLengthM || parseFloat(runLengthM) <= 0) return null;
  const pct = (parseFloat(lengthMm) / (parseFloat(runLengthM) * 1000)) * 100;
  return Math.min(100, Math.max(0, Math.round(pct)));
}

function tcrColor(pct) {
  if (pct === null) return T.dim;
  if (pct >= 75)   return T.accent;
  if (pct >= 50)   return T.amber;
  return T.red;
}

function CoreModule({ activeJob, onGoToJobs, showToast }) {
  if (!activeJob) return <NoJobGuard moduleName="Core" onGoToJobs={onGoToJobs}/>;

  const [tab,          setTab]          = useState("entry");
  const [form,         setForm]         = useState(CORE_INIT);
  const [records,      setRecords]      = useState([]);
  const [confirmClear, setConfirmClear] = useState(false);
  const formScrollRef = useRef(null);

  const jobKey = `${activeJob.PROJ_ID}_${activeJob.POINT_ID}`;

  const loadRecords = useCallback(async () => {
    const all = await dbGetAll("core");
    const filtered = all.filter(r => r.job_key === jobKey);
    filtered.sort((a,b) => parseFloat(a.top||0) - parseFloat(b.top||0));
    setRecords(filtered);
  }, [jobKey]);

  useEffect(() => { loadRecords(); }, [loadRecords]);
  useEffect(() => { setForm(CORE_INIT); setTab("entry"); }, [jobKey]);

  const set = useCallback((field, value) =>
    setForm(p => ({ ...p, [field]: value })), []);

  // Method selection — auto-fills diameter if defined
  const selectMethod = useCallback((v) => {
    const m = CORE_METHODS.find(x => x.v === v);
    setForm(p => ({
      ...p,
      Method: p.Method === v ? "" : v,
      Diameter: p.Method === v ? p.Diameter  // deselecting — keep current diameter
               : (m?.diameter != null ? String(m.diameter) : p.Diameter),
    }));
  }, []);

  const setNow = () => {
    const now = new Date();
    const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000)
      .toISOString().slice(0, 16);
    set("DrillTime", local);
  };

  const handleSave = async () => {
    if (!form.top)  { showToast("Enter top depth");         return; }
    if (!form.base) { showToast("Enter base depth");        return; }
    const runLength = parseFloat(form.base) - parseFloat(form.top);
    if (runLength <= 0) { showToast("Base must be > Top"); return; }

    const tcrPct = calcPct(form.TCRLength, runLength);

    const record = {
      id:          `core_${Date.now()}`,
      job_key:     jobKey,
      PROJ_ID:     activeJob.PROJ_ID,
      POINT_ID:    activeJob.POINT_ID,
      top:         parseFloat(form.top),
      base:        parseFloat(form.base),
      Thickness:   runLength,
      Method:      form.Method || null,
      Diameter:    form.Diameter ? parseFloat(form.Diameter) : null,
      TCRLength:   form.TCRLength ? parseFloat(form.TCRLength) : null,
      TCR:         tcrPct,
      TCRCalc:     tcrPct,
      DrillTime:   form.DrillTime || null,
      Drivability: form.Drivability,
      Remarks:     form.Remarks || null,
      created_at:  new Date().toISOString(),
      sync_status: "pending",
    };

    await dbPut("core", record);
    await loadRecords();

    const nextTop = parseFloat(form.base).toFixed(2);
    setForm({ ...CORE_INIT, top: nextTop, Method: form.Method, Diameter: form.Diameter });
    if (formScrollRef.current) formScrollRef.current.scrollTop = 0;
    showToast("Core run saved ✓");
  };

  const handleDelete = async (id) => {
    await dbDelete("core", id);
    await loadRecords();
  };

  const handleClearAll = async () => {
    setConfirmClear(false);
    const all = await dbGetAll("core");
    await Promise.all(all.filter(r => r.job_key === jobKey).map(r => dbDelete("core", r.id)));
    await loadRecords();
    showToast("History cleared");
  };

  const handleExport = () => {
    if (!records.length) { showToast("No records to export"); return; }
    const hdrs = ["id","PROJ_ID","POINT_ID","top","base","Thickness",
      "Method","Diameter","TCRLength","TCR","TCRCalc",
      "DrillTime","Drivability","Remarks","created_at","sync_status"];
    const rows = records.map(r =>
      hdrs.map(h => {
        const v = r[h] ?? "";
        const s = String(v);
        return (s.includes(",") || s.includes('"')) ? `"${s.replace(/"/g,'""')}"` : s;
      }).join(",")
    );
    const blob = new Blob([[hdrs.join(","), ...rows].join("\r\n")], { type:"text/csv" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url;
    a.download = `core_${activeJob.PROJ_ID}_${activeJob.POINT_ID}_${new Date().toISOString().slice(0,10)}.csv`;
    a.click(); URL.revokeObjectURL(url);
    showToast("CSV exported");
  };

  // ── Derived values ──
  const runLength = (form.top !== "" && form.base !== "")
    ? parseFloat(form.base) - parseFloat(form.top) : null;
  const tcrPct = calcPct(form.TCRLength, runLength);
  const tcrCol = tcrColor(tcrPct);
  const totalRun = records.reduce((s,r) => s + (parseFloat(r.base||0)-parseFloat(r.top||0)), 0);
  const avgTCR   = records.length
    ? Math.round(records.reduce((s,r) => s+(r.TCR||0),0) / records.length) : null;

  // Reusable small depth input
  const depthInp = { background:T.surface2, border:`1.5px solid ${T.border2}`, borderRadius:8,
    color:T.text, fontFamily:T.sans, fontSize:20, fontWeight:700,
    padding:"9px 8px", textAlign:"center", outline:"none",
    width:"100%", WebkitAppearance:"none" };

  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>

      {/* Sub-header tabs */}
      <div style={{ background:T.white, borderBottom:`1px solid ${T.border}`, flexShrink:0 }}>
        <div style={{ display:"flex", alignItems:"center", padding:"0 12px" }}>
          {[["entry","Entry"],["history",`History (${records.length})`]].map(([id,label]) => {
            const active = tab === id;
            return (
              <button key={id} onClick={() => { setTab(id); setConfirmClear(false); }} style={{
                flex:1, padding:"11px 0", background:"transparent", border:"none",
                fontFamily:T.sans, fontSize:14, fontWeight:active?700:500,
                color:active?T.text:T.dim, cursor:"pointer",
                borderTop:`3px solid ${active?T.rock:"transparent"}`,
                transition:"all 0.15s", WebkitTapHighlightColor:"transparent",
              }}>{label}</button>
            );
          })}
          {tab==="entry" && (
            <button onClick={() => { setForm(CORE_INIT); if(formScrollRef.current) formScrollRef.current.scrollTop=0; }}
              style={{ padding:"6px 12px", borderRadius:7, background:"transparent",
                border:`1.5px solid ${T.border2}`, fontFamily:T.sans, fontSize:12,
                fontWeight:600, color:T.dim, cursor:"pointer", marginLeft:"auto",
                marginBottom:2, WebkitTapHighlightColor:"transparent" }}>Clear</button>
          )}
          {tab==="history" && (
            <div style={{ marginLeft:"auto", display:"flex", gap:6, paddingBottom:2 }}>
              <button onClick={handleExport} style={{ padding:"6px 12px", borderRadius:7,
                background:T.rock, color:T.white, border:"none", fontFamily:T.sans,
                fontSize:12, fontWeight:700, cursor:"pointer" }}>↓ CSV</button>
              {confirmClear ? (
                <div style={{ display:"flex", gap:5, alignItems:"center" }}>
                  <span style={{ fontFamily:T.sans, fontSize:12, color:T.red, fontWeight:600 }}>Sure?</span>
                  <button onClick={handleClearAll} style={{ padding:"5px 10px", borderRadius:7,
                    background:T.red, border:"none", fontFamily:T.sans, fontSize:12,
                    fontWeight:700, color:T.white, cursor:"pointer" }}>Yes</button>
                  <button onClick={()=>setConfirmClear(false)} style={{ padding:"5px 10px",
                    borderRadius:7, background:"transparent", border:`1.5px solid ${T.border2}`,
                    fontFamily:T.sans, fontSize:12, color:T.dim, cursor:"pointer" }}>No</button>
                </div>
              ) : (
                <button onClick={()=>setConfirmClear(true)} style={{ padding:"6px 12px",
                  borderRadius:7, background:"transparent", border:`1.5px solid ${T.red}`,
                  fontFamily:T.sans, fontSize:12, fontWeight:600, color:T.red, cursor:"pointer" }}>
                  Clear All
                </button>
              )}
            </div>
          )}
        </div>
      </div>

      {/* ── ENTRY TAB ── */}
      {tab==="entry" && (
        <div ref={formScrollRef} style={{ flex:1, overflowY:"auto", paddingBottom:24 }}>

          {/* Method */}
          <SectionLabel>Method</SectionLabel>
          <Card>
            <CardSection last>
              <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
                {CORE_METHODS.map(m => {
                  const sel = form.Method === m.v;
                  return (
                    <button key={m.v} onClick={() => selectMethod(m.v)} style={{
                      padding:"10px 16px", borderRadius:9,
                      border:`2px solid ${sel ? T.rock : T.border}`,
                      background: sel ? T.rock : T.surface2,
                      color: sel ? T.white : T.text,
                      fontFamily:T.sans, fontSize:15, fontWeight: sel ? 700 : 500,
                      cursor:"pointer", WebkitTapHighlightColor:"transparent",
                      transition:"all 0.1s",
                    }}>
                      {m.label}
                      {m.diameter && (
                        <span style={{ marginLeft:5, fontSize:11, opacity:0.7,
                          fontWeight:400 }}>
                          {m.diameter}mm
                        </span>
                      )}
                    </button>
                  );
                })}
              </div>
            </CardSection>
          </Card>

          {/* Top / Base / TCR — one row */}
          <SectionLabel>Depth &amp; Recovery</SectionLabel>
          <Card>
            <CardSection last>
              <div style={{ display:"flex", gap:8, alignItems:"flex-start" }}>
                {/* Top */}
                <div style={{ flex:1 }}>
                  <FieldLabel>Top (m)</FieldLabel>
                  <input type="number" value={form.top} step="0.01" min="0"
                    onChange={e=>set("top",e.target.value)}
                    placeholder="0.00" inputMode="decimal" style={depthInp}/>
                </div>
                {/* Base */}
                <div style={{ flex:1 }}>
                  <FieldLabel>Base (m)</FieldLabel>
                  <input type="number" value={form.base} step="0.01" min="0"
                    onChange={e=>set("base",e.target.value)}
                    placeholder="1.50" inputMode="decimal" style={depthInp}/>
                </div>
                {/* TCR */}
                <div style={{ flex:1.2 }}>
                  <FieldLabel>TCR (mm)</FieldLabel>
                  <input type="number" value={form.TCRLength} step="1" min="0"
                    onChange={e=>set("TCRLength",e.target.value)}
                    placeholder="—" inputMode="numeric" style={depthInp}/>
                </div>
                {/* Live TCR % */}
                <div style={{
                  flex:0.8, display:"flex", flexDirection:"column",
                  alignItems:"center", justifyContent:"flex-end",
                  paddingBottom:2,
                }}>
                  <FieldLabel>TCR %</FieldLabel>
                  <div style={{
                    width:"100%", background:T.surface2, borderRadius:8,
                    border:`2px solid ${tcrPct !== null ? tcrCol+"60" : T.border}`,
                    padding:"7px 4px", textAlign:"center",
                    transition:"border-color 0.2s",
                    minHeight:44, display:"flex", flexDirection:"column",
                    alignItems:"center", justifyContent:"center",
                  }}>
                    <div style={{ fontFamily:T.sans, fontSize:20, fontWeight:800,
                      lineHeight:1, color: tcrPct !== null ? tcrCol : T.dim }}>
                      {tcrPct !== null ? tcrPct+"%" : "—"}
                    </div>
                    {/* mini bar */}
                    {tcrPct !== null && (
                      <div style={{ width:"80%", height:4, background:T.border,
                        borderRadius:2, overflow:"hidden", marginTop:4 }}>
                        <div style={{ height:"100%", width:`${tcrPct}%`,
                          background:tcrCol, borderRadius:2 }}/>
                      </div>
                    )}
                  </div>
                </div>
              </div>
              {/* Run length hint */}
              {runLength !== null && runLength > 0 && (
                <div style={{ marginTop:8, fontFamily:T.sans, fontSize:12,
                  color:T.dim, textAlign:"right" }}>
                  Run: {runLength.toFixed(2)}m = {Math.round(runLength*1000)}mm
                </div>
              )}
              {runLength !== null && runLength <= 0 && (
                <div style={{ marginTop:8, fontFamily:T.sans, fontSize:12, color:T.red }}>
                  ⚠ Base must be greater than Top
                </div>
              )}
            </CardSection>
          </Card>

          {/* Diameter */}
          <SectionLabel>Diameter (mm)</SectionLabel>
          <Card>
            <CardSection last>
              <input type="number" value={form.Diameter} step="1" min="0"
                onChange={e=>set("Diameter",e.target.value)}
                placeholder="e.g. 64"
                inputMode="numeric"
                style={{ ...depthInp, width:"140px", fontSize:22 }}/>
              {form.Method && CORE_METHODS.find(m=>m.v===form.Method)?.diameter && (
                <div style={{ fontFamily:T.sans, fontSize:12, color:T.dim, marginTop:6 }}>
                  Auto-filled from {form.Method}
                </div>
              )}
            </CardSection>
          </Card>

          {/* Date/Time with NOW button */}
          <SectionLabel>Drill Time</SectionLabel>
          <Card>
            <CardSection last>
              <div style={{ display:"flex", gap:8, alignItems:"flex-end" }}>
                <div style={{ flex:1 }}>
                  <input type="datetime-local" value={form.DrillTime}
                    onChange={e=>set("DrillTime",e.target.value)}
                    style={{ width:"100%", background:T.surface2,
                      border:`1.5px solid ${T.border2}`, borderRadius:8,
                      color: form.DrillTime ? T.text : T.dim,
                      fontFamily:T.sans, fontSize:15,
                      padding:"10px 12px", outline:"none" }}/>
                </div>
                <button onClick={setNow} style={{
                  padding:"10px 16px", borderRadius:8,
                  background:T.rock, color:T.white,
                  border:"none", fontFamily:T.sans,
                  fontSize:13, fontWeight:700, cursor:"pointer",
                  whiteSpace:"nowrap", flexShrink:0,
                  WebkitTapHighlightColor:"transparent",
                }}>Now</button>
              </div>
            </CardSection>
          </Card>

          {/* Drivability slider */}
          <SectionLabel>Drivability</SectionLabel>
          <Card>
            <CardSection last>
              <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                <span style={{ fontFamily:T.sans, fontSize:12, color:T.dim,
                  minWidth:60 }}>Easy (1)</span>
                <input type="range" min="1" max="5" step="1"
                  value={form.Drivability}
                  onChange={e=>set("Drivability", parseInt(e.target.value))}
                  style={{ flex:1, accentColor:T.rock }}/>
                <span style={{ fontFamily:T.sans, fontSize:12, color:T.dim,
                  minWidth:60, textAlign:"right" }}>Hard (5)</span>
              </div>
              {/* Tick marks + value label */}
              <div style={{ display:"flex", justifyContent:"space-between",
                padding:"0 4px", marginTop:4 }}>
                {[1,2,3,4,5].map(n => (
                  <div key={n} style={{ textAlign:"center", flex:1 }}>
                    <div style={{
                      fontFamily:T.sans, fontSize:13, fontWeight:700,
                      color: form.Drivability===n ? T.rock : T.dim,
                      transition:"color 0.15s",
                    }}>{n}</div>
                  </div>
                ))}
              </div>
            </CardSection>
          </Card>

          {/* Remarks */}
          <SectionLabel>Remarks</SectionLabel>
          <Card>
            <CardSection last>
              <textarea value={form.Remarks} rows={3}
                onChange={e=>set("Remarks",e.target.value)}
                placeholder="Core condition, fracture notes, loss zones, colour changes…"
                style={{ width:"100%", background:T.surface2,
                  border:`1.5px solid ${T.border}`, borderRadius:8,
                  color:T.text, fontFamily:T.sans, fontSize:14,
                  padding:"10px 12px", outline:"none",
                  resize:"none", lineHeight:1.6 }}/>
            </CardSection>
          </Card>

          <div style={{ padding:"0 12px" }}>
            <Btn onClick={handleSave} color={T.rock} style={{ width:"100%" }}>
              Save Core Run
            </Btn>
          </div>
        </div>
      )}

      {/* ── HISTORY TAB ── */}
      {tab==="history" && (
        <div style={{ flex:1, overflowY:"auto", padding:"8px 0 24px" }}>
          {records.length === 0 ? (
            <div style={{ textAlign:"center", padding:"48px 24px",
              fontFamily:T.sans, fontSize:15, color:T.dim, lineHeight:1.8 }}>
              No core runs for {activeJob.POINT_ID} yet.<br/>
              <span style={{ fontSize:13 }}>Switch to Entry to start logging.</span>
            </div>
          ) : (
            <>
              {/* Summary stats */}
              <div style={{ margin:"0 12px 10px", background:T.white,
                borderRadius:10, boxShadow:T.shadow, padding:"10px 14px",
                display:"flex", gap:0 }}>
                {[["Runs",records.length],["Total",totalRun.toFixed(1)+"m"],
                  ["Avg TCR", avgTCR!==null ? avgTCR+"%" : "—"]].map(([label,value],idx) => (
                  <div key={label} style={{ flex:1, textAlign:"center",
                    borderRight:idx<2?`1px solid ${T.border}`:"none" }}>
                    <div style={{ fontFamily:T.sans, fontSize:10, color:T.dim,
                      letterSpacing:"0.08em", marginBottom:2 }}>{label}</div>
                    <div style={{ fontFamily:T.sans, fontSize:18, fontWeight:700,
                      color:T.rock }}>{value}</div>
                  </div>
                ))}
              </div>

              {records.map(r => {
                const rl = parseFloat(r.base||0) - parseFloat(r.top||0);
                const tcrPct = r.TCR ?? null;
                const col    = tcrColor(tcrPct);
                return (
                  <div key={r.id} style={{ background:T.surface, margin:"0 12px 8px",
                    borderRadius:10, boxShadow:T.shadow,
                    borderLeft:`4px solid ${T.rock}`, overflow:"hidden" }}>
                    {/* Card header */}
                    <div style={{ display:"flex", alignItems:"center", gap:8,
                      padding:"9px 12px 8px", borderBottom:`1px solid ${T.border}` }}>
                      {r.Method && (
                        <span style={{ background:T.rock, color:T.white,
                          fontFamily:T.sans, fontSize:10, fontWeight:700,
                          letterSpacing:"0.08em", padding:"3px 8px", borderRadius:5 }}>
                          {r.Method}
                        </span>
                      )}
                      <span style={{ fontFamily:T.sans, fontSize:14,
                        fontWeight:700, color:T.rock }}>
                        {parseFloat(r.top).toFixed(2)}–{parseFloat(r.base).toFixed(2)}m
                      </span>
                      <span style={{ fontFamily:T.sans, fontSize:12, color:T.dim }}>
                        {rl.toFixed(2)}m
                      </span>
                      {r.Diameter && (
                        <span style={{ fontFamily:T.sans, fontSize:11, color:T.dim,
                          background:T.surface2, padding:"2px 6px", borderRadius:4 }}>
                          ⌀{r.Diameter}mm
                        </span>
                      )}
                      <button onClick={() => handleDelete(r.id)} style={{
                        background:"none", border:"none", color:T.dim,
                        fontSize:20, cursor:"pointer", padding:"0 2px",
                        lineHeight:1, marginLeft:"auto" }}>×</button>
                    </div>
                    {/* TCR row */}
                    <div style={{ padding:"10px 12px",
                      display:"flex", alignItems:"center", gap:12 }}>
                      <div style={{ flex:1 }}>
                        <div style={{ display:"flex", justifyContent:"space-between",
                          marginBottom:5 }}>
                          <span style={{ fontFamily:T.sans, fontSize:11,
                            color:T.dim, letterSpacing:"0.06em" }}>TCR</span>
                          <span style={{ fontFamily:T.sans, fontSize:11, color:T.dim }}>
                            {r.TCRLength != null ? r.TCRLength+"mm" : ""}
                          </span>
                        </div>
                        <div style={{ height:8, background:T.border,
                          borderRadius:4, overflow:"hidden" }}>
                          <div style={{ height:"100%",
                            width: tcrPct !== null ? `${tcrPct}%` : "0%",
                            background:col, borderRadius:4,
                            transition:"width 0.3s" }}/>
                        </div>
                      </div>
                      <div style={{ fontFamily:T.sans, fontSize:26, fontWeight:800,
                        color:col, minWidth:58, textAlign:"right" }}>
                        {tcrPct !== null ? tcrPct+"%" : "—"}
                      </div>
                    </div>
                    {/* Meta row */}
                    {(r.Drivability != null || r.DrillTime || r.Remarks) && (
                      <div style={{ padding:"6px 12px 10px",
                        borderTop:`1px solid ${T.border}`,
                        display:"flex", gap:12, flexWrap:"wrap",
                        alignItems:"flex-start" }}>
                        {r.Drivability != null && (
                          <div>
                            <span style={{ fontFamily:T.sans, fontSize:10,
                              color:T.dim, letterSpacing:"0.06em" }}>DRIVABILITY </span>
                            <span style={{ fontFamily:T.sans, fontSize:13,
                              fontWeight:700, color:T.text }}>{r.Drivability}/5</span>
                          </div>
                        )}
                        {r.DrillTime && (
                          <div>
                            <span style={{ fontFamily:T.sans, fontSize:10,
                              color:T.dim, letterSpacing:"0.06em" }}>TIME </span>
                            <span style={{ fontFamily:T.sans, fontSize:13,
                              color:T.text }}>
                              {new Date(r.DrillTime).toLocaleTimeString("en-NZ",
                                { hour:"2-digit", minute:"2-digit" })}
                            </span>
                          </div>
                        )}
                        {r.Remarks?.trim() && (
                          <div style={{ width:"100%", fontFamily:T.sans,
                            fontSize:13, color:T.dim, lineHeight:1.5,
                            marginTop:2 }}>
                            {r.Remarks}
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </>
          )}
        </div>
      )}
    </div>
  );
}

// ─── PHOTOS MODULE ────────────────────────────────────────────────────

const PHOTO_CATEGORIES = [
  { id:"site_setup",  label:"Site Setup",    hint:"Before drilling — site access, layout, surrounds",  icon:"map-pin"   },
  { id:"pre_drill",   label:"Pre-Drill",     hint:"Condition of area before hole commenced",            icon:"eye"       },
  { id:"core_box",    label:"Core Box",      hint:"Core tray photos in sequence",                      icon:"layers"    },
  { id:"post_drill",  label:"Post-Drill",    hint:"Completed hole, reinstatement, grouting",            icon:"check-circle"},
  { id:"general",     label:"General",       hint:"Anything else of interest",                         icon:"camera"    },
];

function PhotoIcon({ name, size=18, color="currentColor" }) {
  const paths = {
    "map-pin":     ["M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z","M12 10a2 2 0 100-4 2 2 0 000 4z"],
    "eye":         ["M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z","M12 9a3 3 0 100 6 3 3 0 000-6z"],
    "layers":      ["M12 2L2 7l10 5 10-5-10-5z","M2 17l10 5 10-5","M2 12l10 5 10-5"],
    "check-circle":["M22 11.08V12a10 10 0 11-5.93-9.14","M22 4L12 14.01l-3-3"],
    "camera":      ["M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z","M12 17a4 4 0 100-8 4 4 0 000 8z"],
    "plus":        ["M12 5v14M5 12h14"],
    "trash":       ["M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"],
    "image":       ["M21 19a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h14a2 2 0 012 2zM8.5 10a1.5 1.5 0 100-3 1.5 1.5 0 000 3zM21 15l-5-5L5 19"],
    "download":    ["M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"],
  };
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
      stroke={color} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round">
      {(paths[name]||[]).map((d,i) => <path key={i} d={d}/>)}
    </svg>
  );
}

// Compress image to JPEG before storing
function compressImage(file, maxDim=1200, quality=0.75) {
  return new Promise((resolve) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      let w = img.width, h = img.height;
      if (w > maxDim || h > maxDim) {
        if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
        else       { w = Math.round(w * maxDim / h); h = maxDim; }
      }
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL("image/jpeg", quality));
    };
    img.onerror = () => { URL.revokeObjectURL(url); resolve(null); };
    img.src = url;
  });
}

function PhotosModule({ activeJob, onGoToJobs, showToast }) {
  if (!activeJob) return <NoJobGuard moduleName="Photos" onGoToJobs={onGoToJobs}/>;

  const [activeCategory, setActiveCategory] = useState(null);
  const [boxNumber,      setBoxNumber]       = useState("1");
  const [records,        setRecords]         = useState([]);
  const [loading,        setLoading]         = useState(false);
  const [exporting,      setExporting]       = useState(false);
  const cameraRef  = useRef(null);
  const galleryRef = useRef(null);

  const jobKey = `${activeJob.PROJ_ID}_${activeJob.POINT_ID}`;

  const loadRecords = useCallback(async () => {
    const all = await dbGetAll("photos");
    const filtered = all.filter(r => r.job_key === jobKey);
    filtered.sort((a,b) => (a.created_at||"").localeCompare(b.created_at||""));
    setRecords(filtered);
  }, [jobKey]);

  useEffect(() => { loadRecords(); }, [loadRecords]);
  useEffect(() => { setActiveCategory(null); setBoxNumber("1"); }, [jobKey]);

  const handleFiles = async (files) => {
    if (!activeCategory) { showToast("Select a category first"); return; }
    if (!files?.length)  return;
    setLoading(true);
    const toSave = [];
    for (const file of Array.from(files)) {
      const data = await compressImage(file);
      if (!data) continue;
      toSave.push({
        id:          `photo_${Date.now()}_${Math.random().toString(36).slice(2,7)}`,
        job_key:     jobKey,
        PROJ_ID:     activeJob.PROJ_ID,
        POINT_ID:    activeJob.POINT_ID,
        category:    activeCategory,
        box_number:  activeCategory === "core_box" ? parseInt(boxNumber)||1 : null,
        data,
        created_at:  new Date().toISOString(),
        sync_status: "pending",
      });
    }
    await Promise.all(toSave.map(r => dbPut("photos", r)));
    await loadRecords();
    setLoading(false);
    showToast(`${toSave.length} photo${toSave.length>1?"s":""} saved ✓`);
  };

  const handleDelete = async (id) => {
    await dbDelete("photos", id);
    await loadRecords();
  };

  const handleExport = async () => {
    if (!records.length) { showToast("No photos to export"); return; }
    setExporting(true);
    const payload = {
      PROJ_ID:   activeJob.PROJ_ID,
      POINT_ID:  activeJob.POINT_ID,
      exported:  new Date().toISOString(),
      count:     records.length,

        id:         r.id,
        category:   r.category,
        box_number: r.box_number,
        created_at: r.created_at,
        data:       r.data,
      })),
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type:"application/json" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url;
    a.download = `photos_${activeJob.PROJ_ID}_${activeJob.POINT_ID}_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    setExporting(false);
    showToast("Photos exported");
  };

  // Group records by category for gallery view
  const byCategory = PHOTO_CATEGORIES.map(cat => ({
    ...cat,
    photos: records.filter(r => r.category === cat.id)
      .sort((a,b) => (a.box_number||0)-(b.box_number||0) || (a.created_at||"").localeCompare(b.created_at||"")),
  }));

          </div>
          {totalPhotos > 0 && (
            <button onClick={handleExport} disabled={exporting} style={{
              padding:"6px 12px", borderRadius:7, background:T.teal,
              color:T.white, border:"none", fontFamily:T.sans,

        <SectionLabel>Category</SectionLabel>
        <div style={{ padding:"0 12px", display:"flex", flexDirection:"column", gap:6 }}>
          {PHOTO_CATEGORIES.map(cat => {
            const sel = activeCategory === cat.id;

            return (

                style={{
                  display:"flex", alignItems:"center", gap:12,

                    Increment for each tray

                </div>
              </CardSection>
            </Card>
          </>
        )}

        {/* Capture buttons */}
        {activeCategory && (
          <>
            <SectionLabel>Add Photo{activeCategory==="core_box"?` — Box ${boxNumber}`:""}</SectionLabel>
            <div style={{ padding:"0 12px", display:"flex", gap:8 }}>

                  WebkitTapHighlightColor:"transparent" }}>
                <PhotoIcon name="camera" size={24} color={T.white}/>

              {/* Gallery */}

        {totalPhotos === 0 && !activeCategory && (
          <div style={{ textAlign:"center", padding:"32px 24px",
            fontFamily:T.sans, fontSize:14, color:T.dim, lineHeight:1.8 }}>

        )}
      </div>

  );

                      <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                        {CONSUMABLE_UNITS.map(u => (
                          <button key={u} onClick={() => set("unit",u)}
                            style={{ padding:"8px 12px", borderRadius:8,
                              border:`2px solid ${form.unit===u?accentC:T.border}`,
                              background:form.unit===u?accentC:T.surface2,
                              color:form.unit===u?T.white:T.text,
                              fontFamily:T.sans, fontSize:13,
                              fontWeight:form.unit===u?700:500,
                              cursor:"pointer", WebkitTapHighlightColor:"transparent" }}>
                            {u}
                          </button>
                        ))}
                      </div>
                    </div>
                  </div>
                </CardSection>
              </Card>

              <SectionLabel>Remarks</SectionLabel>
              <Card>
                <CardSection last>
                  <textarea value={form.remarks} rows={2}
                    onChange={e => set("remarks", e.target.value)}
                    placeholder="Optional notes…"
                    style={{ width:"100%", background:T.surface2,
                      border:`1px solid ${T.border}`, borderRadius:8,
                      color:T.text, fontFamily:T.sans, fontSize:14,
                      padding:"10px 12px", outline:"none",
                      resize:"none", lineHeight:1.5 }}/>
                </CardSection>
              </Card>

              <div style={{ padding:"0 12px" }}>
                <Btn onClick={handleSave} color={accentC} style={{ width:"100%" }}>
                  Add to Log
                </Btn>
              </div>
            </>
          )}

          {!selCat && (
            <div style={{ textAlign:"center", padding:"32px 24px",
              fontFamily:T.sans, fontSize:14, color:T.dim, lineHeight:1.8 }}>
              Select a category to start logging consumables.
            </div>
          )}
        </div>
      )}

      {/* Log tab */}
      {tab==="history" && (
        <div style={{ flex:1, overflowY:"auto", padding:"8px 0 24px" }}>
          {records.length === 0 ? (
            <div style={{ textAlign:"center", padding:"48px 24px",
              fontFamily:T.sans, fontSize:15, color:T.dim, lineHeight:1.8 }}>
              No consumables logged for {activeJob.POINT_ID} yet.
            </div>
          ) : (
            <>
              {records.map(r => {
                const cat = CONSUMABLE_CATEGORIES.find(c => c.id === r.category);
                return (
                  <div key={r.id} style={{ background:T.surface,
                    margin:"0 12px 6px", borderRadius:10,
                    border:`1px solid ${T.border}`,
                    boxShadow:"0 1px 2px rgba(0,0,0,0.04)",
                    display:"flex", alignItems:"center",
                    padding:"11px 14px", gap:10 }}>
                    <div style={{ flex:1 }}>
                      <div style={{ fontFamily:T.sans, fontSize:14,
                        fontWeight:600, color:T.text }}>{r.item}</div>
                      <div style={{ fontFamily:T.sans, fontSize:12,
                        color:T.dim, marginTop:1 }}>
                        {cat?.label}
                        {r.remarks ? ` · ${r.remarks}` : ""}
                      </div>
                    </div>
                    <div style={{ textAlign:"right", flexShrink:0 }}>
                      <div style={{ fontFamily:T.sans, fontSize:18,
                        fontWeight:800, color:accentC }}>
                        {r.qty}
                        <span style={{ fontSize:12, fontWeight:500,
                          color:T.dim, marginLeft:4 }}>{r.unit}</span>
                      </div>
                    </div>
                    <button onClick={() => handleDelete(r.id)} style={{
                      background:"none", border:"none", color:T.dim,
                      fontSize:20, cursor:"pointer", padding:"0 2px",
                      lineHeight:1, flexShrink:0 }}>×</button>
                  </div>
                );
              })}
            </>
          )}
        </div>
      )}
    </div>
  );
}


// ─── PLACEHOLDER MODULE ──────────────────────────────────────────────

function PlaceholderModule({ name, icon, color, activeJob, onGoToJobs }) {
  if (!activeJob) return <NoJobGuard moduleName={name} onGoToJobs={onGoToJobs} />;
  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column",
      alignItems:"center", justifyContent:"center",
      padding:"40px 24px", textAlign:"center" }}>
      <div style={{ fontSize:48, marginBottom:16, color }}>{icon}</div>
      <div style={{ fontFamily:T.sans, fontSize:18, fontWeight:700,
        color:T.text, marginBottom:8 }}>{name}</div>
      <div style={{ fontFamily:T.sans, fontSize:13, color:T.accent,
        marginBottom:8 }}>{activeJob.PROJ_ID} / {activeJob.POINT_ID}</div>
      <div style={{ fontFamily:T.sans, fontSize:14, color:T.dim, lineHeight:1.6 }}>
        Coming soon — this module is under development.
      </div>
    </div>
  );
}

// ─── ROOT APP ─────────────────────────────────────────────────────────
function App() {
  const [activeModule, setActiveModule] = useState("jobs");
  const [activeJob,    setActiveJob]    = useState(null);
  const [toast,        setToast]        = useState({ msg:"", visible:false });
  const toastTimer = useRef(null);

  // Load active job and seed sample data on mount
  useEffect(() => {
    seedSampleData();
    dbGet("active_job","active").then(job => {
      if (job) setActiveJob(job);
    });
  }, []);

  const showToast = useCallback((msg) => {
    setToast({ msg, visible:true });
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() =>
      setToast(t => ({ ...t, visible:false })), 2500);
  }, []);

  const handleSetActiveJob = useCallback((job) => {
    setActiveJob(job);
    if (job) setActiveModule("geo"); // jump to geo after selecting job
  }, []);

  const goToJobs = useCallback(() => setActiveModule("jobs"), []);

  const activeColor = MODULES.find(m => m.id === activeModule)?.color || T.accent;

  const renderModule = () => {
    switch(activeModule) {
      case "jobs":
        return <JobsModule
          activeJob={activeJob}
          setActiveJob={handleSetActiveJob}
          showToast={showToast} />;
      case "geo": return <GeoModule activeJob={activeJob} showToast={showToast}/>;
      case "spt": return <SPTModule activeJob={activeJob} showToast={showToast}/>;
      case "core":
        return <CoreModule activeJob={activeJob} onGoToJobs={goToJobs} showToast={showToast}/>;
      case "photos":
        return <PhotosModule activeJob={activeJob} onGoToJobs={goToJobs} showToast={showToast}/>;
      case "notes":
        return <ConsumablesModule activeJob={activeJob} onGoToJobs={goToJobs} showToast={showToast}/>;
      default: return null;
    }
  };

  return (
    <div style={{ background:T.bg, height:"100vh", display:"flex",
      flexDirection:"column", color:T.text, fontFamily:T.sans, overflow:"hidden" }}>

      {/* ── HEADER ── dark nav style */}
      <div style={{ background:T.nav, padding:"11px 16px 10px",
        flexShrink:0, display:"flex", alignItems:"center", gap:12 }}>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <div style={{ width:30, height:30, borderRadius:7, background:T.amber,
            display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
            <span style={{ fontFamily:T.sans, fontSize:12, fontWeight:900,
              color:T.nav, letterSpacing:"-0.02em" }}>ST</span>
          </div>
          <div>
            <div style={{ fontSize:13, fontWeight:800, color:T.white,
              letterSpacing:"0.02em", lineHeight:1 }}>SUBSTRATA</div>
            <div style={{ fontSize:9, color:T.navText,
              letterSpacing:"0.12em", marginTop:1 }}>FIELD OPERATIONS</div>
          </div>
        </div>
        {activeJob ? (
          <button onClick={() => setActiveModule("jobs")} style={{
            marginLeft:"auto", background:"rgba(255,255,255,0.07)",
            border:"1px solid rgba(255,255,255,0.12)",
            borderRadius:8, padding:"5px 12px",
            display:"flex", alignItems:"center", gap:8,
            cursor:"pointer", WebkitTapHighlightColor:"transparent" }}>
            <div style={{ textAlign:"right" }}>
              <div style={{ fontFamily:T.sans, fontSize:10, fontWeight:600,
                color:T.navText, letterSpacing:"0.06em", lineHeight:1 }}>
                {activeJob.PROJ_ID}
              </div>
              <div style={{ fontFamily:T.sans, fontSize:13, fontWeight:700,
                color:T.white, lineHeight:1, marginTop:2 }}>
                {activeJob.POINT_ID}
              </div>
            </div>
            <div style={{ width:7, height:7, borderRadius:"50%",
              background:T.accent, flexShrink:0 }}/>
          </button>
        ) : (
          <button onClick={() => setActiveModule("jobs")} style={{
            marginLeft:"auto", background:T.amber+"22",
            border:`1px solid ${T.amber}60`,
            borderRadius:8, padding:"7px 14px",
            cursor:"pointer", WebkitTapHighlightColor:"transparent",
            fontFamily:T.sans, fontSize:12, fontWeight:700, color:T.amber,
          }}>No job selected</button>
        )}
      </div>

      {/* ── MODULE CONTENT ── */}
      <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
        {renderModule()}
      </div>

      {/* ── TAB BAR — dark SubStrata style ── */}
      <div style={{ background:T.nav, display:"flex", flexShrink:0,
        borderTop:"1px solid rgba(255,255,255,0.06)",
        paddingBottom:"env(safe-area-inset-bottom, 0px)" }}>
        {MODULES.map(m => {
          const active = activeModule === m.id;
          const locked = m.id !== "jobs" && !activeJob;
          return (
            <button key={m.id} onClick={() => !locked && setActiveModule(m.id)} style={{
              flex:1, padding:"10px 0 8px",
              display:"flex", flexDirection:"column",
              alignItems:"center", gap:4,
              background: active ? "rgba(255,255,255,0.07)" : "transparent",
              border:"none", cursor: locked ? "default" : "pointer",
              WebkitTapHighlightColor:"transparent",
              opacity: locked ? 0.28 : 1,
              transition:"background 0.15s",
              position:"relative",
            }}>
              {active && (
                <div style={{ position:"absolute", top:0, left:"50%",
                  transform:"translateX(-50%)",
                  width:24, height:2, borderRadius:"0 0 2px 2px",
                  background:T.navActive }}/>
              )}
              <ModuleIcon name={m.icon} size={18}
                color={active ? T.navActive : T.navText}
                strokeWidth={active ? 2.5 : 1.8}/>
              <span style={{ fontFamily:T.sans, fontSize:10,
                fontWeight: active ? 700 : 500,
                color: active ? T.navActive : T.navText,
                letterSpacing:"0.04em" }}>
                {m.label}
              </span>
            </button>
          );
        })}
      </div>

      <Toast message={toast.msg} visible={toast.visible} />
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
