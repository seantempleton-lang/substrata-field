// ─── INDEXEDDB ────────────────────────────────────────────────────────
const DB_NAME = "substrata-field", DB_VER = 2;
const STORES  = ["active_job","jobs_cache","geology","spt","core","photos","notes"];
let _db = null;

function openDB() {
  return new Promise((res,rej) => {
    if (_db) { res(_db); return; }
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      STORES.forEach(s => {
        if (!d.objectStoreNames.contains(s))
          d.createObjectStore(s, { keyPath:"id" });
      });
    };
    req.onsuccess = e => { _db = e.target.result; res(_db); };
    req.onerror   = e => rej(e.target.error);
  });
}

const dbGet    = (store,id)  => openDB().then(d => new Promise((res,rej) => { const r=d.transaction(store,"readonly").objectStore(store).get(id); r.onsuccess=e=>res(e.target.result); r.onerror=e=>rej(e.target.error); }));
const dbPut    = (store,rec) => openDB().then(d => new Promise((res,rej) => { const tx=d.transaction(store,"readwrite"); tx.objectStore(store).put(rec); tx.oncomplete=res; tx.onerror=e=>rej(e.target.error); }));
const dbGetAll = (store)     => openDB().then(d => new Promise((res,rej) => { const r=d.transaction(store,"readonly").objectStore(store).getAll(); r.onsuccess=e=>res(e.target.result); r.onerror=e=>rej(e.target.error); }));
const dbDelete = (store,id)  => openDB().then(d => new Promise((res,rej) => { const tx=d.transaction(store,"readwrite"); tx.objectStore(store).delete(id); tx.oncomplete=res; tx.onerror=e=>rej(e.target.error); }));
const dbClear  = (store)     => openDB().then(d => new Promise((res,rej) => { const tx=d.transaction(store,"readwrite"); tx.objectStore(store).clear(); tx.oncomplete=res; tx.onerror=e=>rej(e.target.error); }));

    items.push({ ...p, id:`proj_${p.PROJ_ID}`, type:"project" });

      items.push({ ...b, id:`bh_${p.PROJ_ID}_${b.POINT_ID}`,
        type:"borehole", PROJ_ID:p.PROJ_ID });
    });
  });
  await Promise.all(items.map(i => dbPut("jobs_cache",i)));
  console.log(`Sample data seeded: ${SAMPLE_PROJECTS.length} projects`);
}


function uuid() {
  return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, c => {
    const r = Math.random()*16|0;
    return (c==="x" ? r : (r&0x3|0x8)).toString(16);
  });
}

function Btn({ children, onClick, color, outline, small, disabled, style }) {
  const bg     = outline ? "transparent" : (color || T.accent);
  const border = outline ? `1.5px solid ${color || T.border}` : "none";
  const col    = outline ? (color || T.dim) : T.white;
  return (
    <button onClick={onClick} disabled={disabled} style={{
      padding: small ? "8px 16px" : "14px 20px",
      borderRadius:8, border, background: disabled ? T.surface2 : bg,
      color: disabled ? T.dimmer : col,
      fontFamily:T.sans, fontSize: small ? 13 : 15,
      fontWeight:700, cursor: disabled ? "not-allowed" : "pointer",
      opacity: disabled ? 0.6 : 1, letterSpacing:"0.01em",
      WebkitTapHighlightColor:"transparent",
      ...style,
    }}>{children}</button>
  );
}

const BOREHOLE_TYPES = ["BH","CPT","TP","WS","SCPT","DMT","PLT","OTHER"];

function JobsModule({ activeJob, setActiveJob, showToast }) {
  const [view,        setView]        = useState("home"); // home | select_project | select_borehole | new_borehole
  const [projects,    setProjects]    = useState([]);
  const [search,      setSearch]      = useState("");
  const [selProject,  setSelProject]  = useState(null);
  const [boreholes,   setBoreholes]   = useState([]);
  const [bhSearch,    setBhSearch]    = useState("");
  const [syncing,     setSyncing]     = useState(false);
  const [apiBase,     setApiBase]     = useState("");
  const [showApiEdit, setShowApiEdit] = useState(false);
  const [newBH,       setNewBH]       = useState({
    POINT_ID:"", Type:"BH", HoleDepth:"", Location:"", Remarks:""
  });

  // Load cached projects and API base on mount
  useEffect(() => {
    dbGetAll("jobs_cache").then(items => {
      const proj = items.filter(i => i.type === "project");
      setProjects(proj);
    });
    dbGet("active_job","api_base").then(r => {
      if (r) setApiBase(r.value);
    });
  }, []);

  const saveApiBase = async (val) => {
    setApiBase(val);
    await dbPut("active_job", { id:"api_base", value:val });
  };

  // Fetch projects from API
  const fetchProjects = async () => {
    if (!apiBase) { showToast("Enter API address first"); setShowApiEdit(true); return; }
    setSyncing(true);
    try {
      const res = await fetch(`${apiBase}/projects`, { signal: AbortSignal.timeout(8000) });
      if (!res.ok) throw new Error(`Server error ${res.status}`);
      const data = await res.json();
      // Cache to IndexedDB
      await dbClear("jobs_cache");
      await Promise.all(data.map(p => dbPut("jobs_cache", { ...p, id:`proj_${p.PROJ_ID}`, type:"project" })));
      setProjects(data.map(p => ({ ...p, id:`proj_${p.PROJ_ID}`, type:"project" })));
      showToast(`${data.length} projects loaded`);
    } catch(e) {
      showToast("Could not reach server");
    }
    setSyncing(false);
  };

  // Fetch boreholes for a project
  const fetchBoreholes = async (projId) => {
    setSyncing(true);
    try {
      if (apiBase) {
        const res = await fetch(`${apiBase}/points?proj_id=${projId}`, { signal: AbortSignal.timeout(8000) });
        if (!res.ok) throw new Error();
        const data = await res.json();
        // Cache under project
        const cached = data.map(b => ({
          ...b, id:`bh_${projId}_${b.POINT_ID}`, type:"borehole", PROJ_ID: projId
        }));
        await Promise.all(cached.map(b => dbPut("jobs_cache", b)));
        setBoreholes(cached);
      } else {
        // Load from cache only
        const all = await dbGetAll("jobs_cache");
        setBoreholes(all.filter(i => i.type === "borehole" && i.PROJ_ID === projId));
      }
    } catch(e) {
      // Fall back to cache
      const all = await dbGetAll("jobs_cache");
      setBoreholes(all.filter(i => i.type === "borehole" && i.PROJ_ID === projId));
      showToast("Using cached data");
    }
    setSyncing(false);
  };

  const selectProject = async (proj) => {
    setSelProject(proj);
    setView("select_borehole");
    setBhSearch("");
    await fetchBoreholes(proj.PROJ_ID);
  };

  const activateBorehole = async (bh) => {
    const job = {
      id:         "active",
      PROJ_ID:    selProject.PROJ_ID,
      PROJ_NAME:  selProject.PROJ_NAME,
      POINT_ID:   bh.POINT_ID,
      Type:       bh.Type || "BH",
      HoleDepth:  bh.HoleDepth || null,
      Location:   bh.Location || "",
      started_at: new Date().toISOString(),
      is_new:     bh.is_new || false,
      sync_status: bh.is_new ? "pending" : "synced",
    };
    await dbPut("active_job", job);
    setActiveJob(job);
    setView("home");
    showToast(`Job set: ${job.PROJ_ID} / ${job.POINT_ID}`);
  };

  const createBorehole = async () => {
    if (!newBH.POINT_ID.trim()) { showToast("Enter a borehole ID"); return; }
    const bh = {
      ...newBH,
      id:         `bh_${selProject.PROJ_ID}_${newBH.POINT_ID}`,
      type:       "borehole",
      PROJ_ID:    selProject.PROJ_ID,
      is_new:     true,
      created_at: new Date().toISOString(),
      sync_status:"pending",
    };
    await dbPut("jobs_cache", bh);
    await activateBorehole(bh);
  };

  const clearJob = async () => {
    await dbDelete("active_job","active");
    setActiveJob(null);
    showToast("Job cleared");
  };

  const filteredProjects = projects.filter(p =>
    !search ||
    p.PROJ_ID?.toLowerCase().includes(search.toLowerCase()) ||
    p.PROJ_NAME?.toLowerCase().includes(search.toLowerCase())
  );

  const filteredBH = boreholes.filter(b =>
    !bhSearch ||
    b.POINT_ID?.toLowerCase().includes(bhSearch.toLowerCase()) ||
    b.Location?.toLowerCase().includes(bhSearch.toLowerCase())
  );

  // ── HOME VIEW ──
  if (view === "home") return (
    <div style={{ flex:1, overflowY:"auto", paddingBottom:24 }}>

      {activeJob ? (
        <>
          <SectionLabel>Active Job</SectionLabel>
          <Card>
            <CardSection>
              <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between" }}>
                <div>
                  <div style={{ fontFamily:T.sans, fontSize:13, color:T.dim, marginBottom:2 }}>PROJECT</div>
                  <div style={{ fontFamily:T.sans, fontSize:18, fontWeight:700, color:T.text }}>
                    {activeJob.PROJ_ID}
                  </div>
                  <div style={{ fontFamily:T.sans, fontSize:14, color:T.dim, marginTop:1 }}>
                    {activeJob.PROJ_NAME}
                  </div>
                </div>
                {activeJob.is_new && (
                  <span style={{ background:T.amber+"22", border:`1px solid ${T.amber}`,
                    borderRadius:6, fontFamily:T.sans, fontSize:10, fontWeight:700,
                    color:T.amber, padding:"3px 8px", letterSpacing:"0.08em" }}>
                    NEW — pending sync
                  </span>
                )}
              </div>
            </CardSection>
            <CardSection>
              <div style={{ display:"flex", gap:24 }}>
                <div>
                  <div style={{ fontFamily:T.sans, fontSize:11, color:T.dim, marginBottom:2, letterSpacing:"0.06em" }}>BOREHOLE</div>
                  <div style={{ fontFamily:T.sans, fontSize:20, fontWeight:700, color:T.accent }}>
                    {activeJob.POINT_ID}
                  </div>
                </div>
                <div>
                  <div style={{ fontFamily:T.sans, fontSize:11, color:T.dim, marginBottom:2, letterSpacing:"0.06em" }}>TYPE</div>
                  <div style={{ fontFamily:T.sans, fontSize:16, fontWeight:600, color:T.text }}>
                    {activeJob.Type || "—"}
                  </div>
                </div>
                {activeJob.HoleDepth && (

// ─── RANGE SELECT HOOK ────────────────────────────────────────────────
function useRangeSelect(items) {
  const [range, setRange] = useState(null);

  const toggle = useCallback((idx) => {
    setRange(prev => {
      if (!prev) return [idx, idx];
      const [a, b] = prev;
      if (a === b && idx === a) return null;
      if (a === b) return [Math.min(a,idx), Math.max(a,idx)];
      return [idx, idx];
    });
  }, []);

  const clear      = useCallback(() => setRange(null), []);
  const label      = useCallback(() => {
    if (!range) return null;
    const [a,b] = range;
    return a === b ? items[a] : `${items[a]} to ${items[b]}`;
  }, [range, items]);
  const inRange    = useCallback((i) => range ? i >= range[0] && i <= range[1] : false, [range]);
  const isEndpoint = useCallback((i) => range ? i === range[0] || i === range[1]  : false, [range]);

  return { range, toggle, clear, label, inRange, isEndpoint };
}

// ─── DESCRIPTION BUILDERS ─────────────────────────────────────────────
function buildSoilDesc(s) {
  if (!s.major) return "";
  // Grain size prefix goes before the MAJOR name (e.g. "fine to medium GRAVEL")
  const majorWithSize = s.grain_size
    ? s.grain_size + " " + s.major
    : s.major;
  let name = majorWithSize;
  if (s.sec_type === "subordinate" && s.sec_mat) {
    const secItem = SECONDARY_MATERIALS.find(m => m.v === s.sec_mat);
    const adj = secItem ? secItem.adj : s.sec_mat + "y";
    name = adj.startsWith("with ")
      ? majorWithSize + " " + adj
      : adj + " " + majorWithSize;
  } else if (s.sec_type && s.sec_mat) {
    name = majorWithSize + " " + s.sec_type + " " + s.sec_mat;
  }

  const quals = [];
  const colour = [s.col_mod, s.col_main].filter(Boolean).join(" ");
  if (colour)          quals.push(colour);
  if (s.moisture)      quals.push(s.moisture);
  if (s.particle_shape) quals.push(s.particle_shape);
  if (s.remarks?.trim()) quals.push(s.remarks.trim());

  let desc = name + (quals.length ? "; " + quals.join(", ") : "") + ".";

  if (s.top) {
    const d = s.base
      ? `${parseFloat(s.top).toFixed(2)}–${parseFloat(s.base).toFixed(2)}m`
      : `${parseFloat(s.top).toFixed(2)}m`;
    desc = `[${d}] ` + desc;
  }
  return desc;
}

function buildRockDesc(s) {
  const rname = s.rockname || s.rockname_custom?.trim()?.toUpperCase();
  if (!rname) return "";

  const main = [];
  if (s.weathering) {
    const w = WEATHERING.find(x => x.v === s.weathering);
    if (w) main.push(w.l.toLowerCase());
  }
  const colour = [s.r_col_mod, s.r_col_main].filter(Boolean).join(" ");
  if (colour) main.push(colour);
  main.push(rname.toUpperCase());

  const qual = [];
  if (s.rockstrength) qual.push(s.rockstrength);
  if (s.r_remarks?.trim()) qual.push(s.r_remarks.trim());

  let desc = main.join(", ") + (qual.length ? "; " + qual.join(", ") : "") + ".";

  if (s.r_top) {
    const d = s.r_base
      ? `${parseFloat(s.r_top).toFixed(2)}–${parseFloat(s.r_base).toFixed(2)}m`
      : `${parseFloat(s.r_top).toFixed(2)}m`;
    desc = `[${d}] ` + desc;
  }
  return desc;
}

// ─── SOIL FORM ────────────────────────────────────────────────────────
const SOIL_INIT = {
  top:"0.00", base:"", major:null,
  grain_size:null,
  sec_type:"subordinate", sec_mat:null,
  col_mod:null, col_main:null,
  moisture:null, particle_shape:null, remarks:"",
};

function SoilForm({ state:s, dispatch }) {
  const set = (f,v) => dispatch({ field:f, value: s[f]===v ? null : v });
  const moistureR   = useRangeSelect(MOISTURE);
  const shapeR      = useRangeSelect(PARTICLE_SHAPE);
  const grainSizeR  = useRangeSelect(GRAIN_SIZE_COARSE);
  useEffect(() => { dispatch({ field:"moisture",       value:moistureR.label()  }); }, [moistureR.range]);
  useEffect(() => { dispatch({ field:"particle_shape", value:shapeR.label()     }); }, [shapeR.range]);
  useEffect(() => { dispatch({ field:"grain_size",     value:grainSizeR.label() }); }, [grainSizeR.range]);

  // Clear grain size and particle shape if major changes to something that doesn't support them
  useEffect(() => {
    if (s.major && !HAS_GRAIN_SIZE.has(s.major)) {
      dispatch({ field:"grain_size", value:null });
      grainSizeR.clear();
    }
    if (s.major && !HAS_PARTICLE_SHAPE.has(s.major)) {
      dispatch({ field:"particle_shape", value:null });
      shapeR.clear();
    }
  }, [s.major]);

  return <>
    <SectionLabel>Depth</SectionLabel>
    <Card>
      <CardSection last>
        <DepthRow top={s.top} base={s.base}
          onTop={v => dispatch({field:"top",value:v})}
          onBase={v => dispatch({field:"base",value:v})} />
      </CardSection>
    </Card>

    <SectionLabel>Major Material ✱</SectionLabel>
    <Card>
      {["coarse","fine","other"].map((grp,gi) => (
        <CardSection key={grp} last={gi===2}>
          <FieldLabel>{grp==="coarse"?"Coarse soils":grp==="fine"?"Fine soils":"Other"}</FieldLabel>
          <PillRow>
            {MAJOR_SOILS.filter(m=>m.g===grp).map(m => (
              <Pill key={m.v} label={m.v} selected={s.major===m.v}
                onClick={() => {
                  set("major", m.v);
                  const match = SECONDARY_MATERIALS.find(x => x.major === m.v);
                  if (match && s.sec_mat === match.v) dispatch({ field:"sec_mat", value:null });
                }}
                accent={T.accent} />
            ))}
          </PillRow>
        </CardSection>
      ))}
      {/* Grain size — only shown when GRAVEL or SAND is selected */}
      {HAS_GRAIN_SIZE.has(s.major) && (
        <CardSection last>
          <FieldLabel>Grain size — tap once · tap two for a range</FieldLabel>
          <PillRow>
            {GRAIN_SIZE_COARSE.map((v,i) => (
              <RangePill key={v} label={v} idx={i}
                inRange={grainSizeR.inRange(i)}
                isEndpoint={grainSizeR.isEndpoint(i)}
                onClick={grainSizeR.toggle}
                accent={T.accent} />
            ))}
          </PillRow>
        </CardSection>
      )}
    </Card>

    <SectionLabel>Secondary Material</SectionLabel>
    <Card>
      <CardSection>
        <FieldLabel>Proportion / type</FieldLabel>
        <PillRow>
          {MINOR_QTY_OPTS.map(q => (
            <Pill key={q.v} label={q.l} sub={q.hint}
              selected={s.sec_type===q.v}
              onClick={() => set("sec_type",q.v)} accent={T.accent} />
          ))}
        </PillRow>
      </CardSection>
      <CardSection last>
        <FieldLabel>Material</FieldLabel>
        <PillRow>
          {SECONDARY_MATERIALS.map(item => {
            const disabled = !!(item.major && item.major === s.major);
            return (
              <Pill key={item.v} label={item.v}
                selected={s.sec_mat === item.v}
                disabled={disabled}
                onClick={() => set("sec_mat", item.v)}
                accent={T.accent} />
            );
          })}
        </PillRow>
      </CardSection>
    </Card>

    <SectionLabel>Colour</SectionLabel>
    <Card>
      <CardSection>
        <FieldLabel>Modifier (optional)</FieldLabel>
        <PillRow>
          {COLOUR_MODS.map(v => (
            <Pill key={v} label={v} selected={s.col_mod===v}
              onClick={() => set("col_mod",v)} accent={T.amber} />
          ))}
        </PillRow>
      </CardSection>
      <CardSection last>
        <FieldLabel>Main colour</FieldLabel>
        <PillRow>
          {COLOUR_MAIN.map(v => (
            <Pill key={v} label={v} selected={s.col_main===v}
              onClick={() => set("col_main",v)} accent={T.amber} />
          ))}
        </PillRow>
      </CardSection>
    </Card>

    <SectionLabel>Moisture Condition</SectionLabel>
    <Card>
      <CardSection last>
        <FieldLabel>Tap once · tap two for a range</FieldLabel>
        <PillRow>
          {MOISTURE.map((v,i) => (
            <RangePill key={v} label={v} idx={i}
              inRange={moistureR.inRange(i)} isEndpoint={moistureR.isEndpoint(i)}
              onClick={moistureR.toggle} accent={T.amber} />
          ))}
        </PillRow>
      </CardSection>
    </Card>

    {HAS_PARTICLE_SHAPE.has(s.major) && <>
      <SectionLabel>Particle Shape</SectionLabel>
      <Card>
        <CardSection last>
          <FieldLabel>Tap once · tap two for a range</FieldLabel>
          <PillRow>
            {PARTICLE_SHAPE.map((v,i) => (
              <RangePill key={v} label={v} idx={i}

                onClick={shapeR.toggle} accent={T.amber} />

        </CardSection>
      </Card>
    </>}

    <SectionLabel>Remarks / Geological Info</SectionLabel>
    <Card>
      <CardSection last>
        <textarea value={s.remarks} rows={3}
          onChange={e => dispatch({field:"remarks",value:e.target.value})}

  </>;

// Pill with expandable hint — tapping shows/hides hint text
function HintPill({ label, hint, selected, onClick, accent }) {
  const [open, setOpen] = useState(false);
  const handleClick = () => {
    if (!selected) {
      onClick();
      setOpen(true);
    } else {
      setOpen(o => !o);
    }
  };
  return (
    <div style={{ width:"100%" }}>
      <button onClick={handleClick} style={{
        display:"flex", alignItems:"center", justifyContent:"space-between",
        width:"100%", padding:"12px 14px",
        border:`2px solid ${selected ? accent : T.border}`,
        borderRadius: open ? "10px 10px 0 0" : 10,
        background: selected ? accent : T.surface2,
        color: selected ? T.white : T.text,
        fontFamily:T.sans, fontSize:16, fontWeight: selected ? 700 : 500,
        cursor:"pointer", userSelect:"none", textAlign:"left",
        transition:"all 0.1s",
        WebkitTapHighlightColor:"transparent",
      }}>
        <span>{label}</span>
        <span style={{
          fontSize:13, fontWeight:400,
          color: selected ? "rgba(255,255,255,0.7)" : T.dim,
          marginLeft:8,
        }}>{open ? "▲" : "▼ field test"}</span>
      </button>
      {open && (
        <div style={{
          padding:"10px 14px",
          background: selected ? accent+"18" : T.surface2,
          border:`2px solid ${selected ? accent : T.border}`,
          borderTop:"none", borderRadius:"0 0 10px 10px",
          fontFamily:T.mono, fontSize:14, color:T.dim, lineHeight:1.6,
        }}>
          {hint}
        </div>
      )}
    </div>
  );
}

// ─── HISTORY ──────────────────────────────────────────────────────────
function HistoryScreen({ records, onDelete, onReload }) {
  if (!records.length) return (
    <div style={{ textAlign:"center", padding:"60px 24px",
      color:T.dim, fontFamily:T.sans, fontSize:17, lineHeight:1.8 }}>
      No saved logs yet.<br/>
      <span style={{ fontSize:15 }}>Complete a description and tap Save.</span>
    </div>
  );
  const sorted = [...records].sort((a,b) => parseFloat(a.top||0) - parseFloat(b.top||0));
  return (
    <div style={{ padding:"8px 0 40px" }}>
      {sorted.map(r => {
        const isSoil = r.mode === "soil";
        const accent = isSoil ? T.accent : T.rock;
        const topF   = parseFloat(r.top||0).toFixed(2);
        const baseF  = r.base ? parseFloat(r.base).toFixed(2) : null;
        const depth  = baseF ? `${topF}–${baseF}m` : `${topF}m`;
        const date   = r.created_at
          ? new Date(r.created_at).toLocaleString("en-NZ",
              { day:"2-digit", month:"short", hour:"2-digit", minute:"2-digit" })
          : "—";
        return (
          <div key={r.id} style={{
            background:T.surface, margin:"0 12px 10px",
            borderRadius:12, boxShadow:T.shadow,
            borderLeft:`4px solid ${accent}`, overflow:"hidden",
          }}>
            <div style={{ display:"flex", alignItems:"center", gap:8,
              padding:"10px 14px 8px", borderBottom:`1px solid ${T.border}` }}>
              <span style={{ background:accent, color:T.white, fontFamily:T.sans,
                fontSize:12, fontWeight:700, letterSpacing:"0.1em",
                padding:"3px 9px", borderRadius:6 }}>
                {r.mode.toUpperCase()}
              </span>
              <span style={{ fontFamily:T.mono, fontSize:15, fontWeight:700, color:accent }}>
                {depth}
              </span>
              <span style={{ fontFamily:T.sans, fontSize:13, color:T.dim, marginLeft:"auto" }}>
                {date}
              </span>
              <button onClick={() => onReload(r)} style={{
                background:"none", border:`1px solid ${accent}`,
                borderRadius:6, color:accent,
                fontFamily:T.sans, fontSize:11, fontWeight:700,
                letterSpacing:"0.06em",
                cursor:"pointer", padding:"4px 10px", lineHeight:1 }}>
                REUSE
              </button>
              <button onClick={() => onDelete(r.id)} style={{
                background:"none", border:"none", color:T.dim,
                fontSize:22, cursor:"pointer", padding:"0 2px", lineHeight:1 }}>
                ×
              </button>
            </div>
            <div style={{ padding:"10px 14px", fontFamily:T.mono,
              fontSize:14, color:T.text, lineHeight:1.75 }}>
              {r.description}
            </div>
          </div>
        );
      })}
    </div>
  );
}



const GEO_SOIL_INIT = {
  top:"0.00", base:"", major:null, grain_size:null,
  sec_type:"subordinate", sec_mat:null,
  col_mod:null, col_main:null,
  moisture:null, particle_shape:null, remarks:"",
};
const GEO_ROCK_INIT = {
  r_top:"0.00", r_base:"",
  weathering:null, r_col_mod:null, r_col_main:null,
  rockname:null, rockname_custom:"", rockstrength:null, r_remarks:"",
};

function GeoModule({ activeJob, showToast }) {
  const [geoTab,     setGeoTab]     = useState("entry");
  const [geoMode,    setGeoMode]    = useState("soil");
  const [soilState,  setSoilState]  = useState(GEO_SOIL_INIT);
  const [rockState,  setRockState]  = useState(GEO_ROCK_INIT);
  const [records,    setRecords]    = useState([]);
  const [confirmClr, setConfirmClr] = useState(false);
  const formScrollRef = useRef(null);

  const dispatchSoil = useCallback(({field,value}) =>
    setSoilState(p=>({...p,[field]:value})),[]);
  const dispatchRock = useCallback(({field,value}) =>
    setRockState(p=>({...p,[field]:value})),[]);

  const desc   = geoMode==="soil" ? buildSoilDesc(soilState) : buildRockDesc(rockState);
  const accent = geoMode==="soil" ? T.accent : T.rock;

  const loadRecords = useCallback(async () => {
    if (!activeJob) return;
    const all = await dbGetAll("geology");
    const filtered = all
      .filter(r => r.PROJ_ID===activeJob.PROJ_ID && r.POINT_ID===activeJob.POINT_ID)
      .sort((a,b) => parseFloat(a.top||0)-parseFloat(b.top||0));
    setRecords(filtered);
  }, [activeJob]);

  useEffect(() => { loadRecords(); }, [loadRecords]);

  const handleSave = async () => {
    if (!desc) { showToast("Select material first"); return; }
    const s       = geoMode==="soil" ? soilState : rockState;
    const topVal  = geoMode==="soil" ? s.top   : s.r_top;
    const baseVal = geoMode==="soil" ? s.base  : s.r_base;
    if (!baseVal) { showToast("Enter a base depth first"); return; }
    const record = {
      id: `geo_${Date.now()}`, GEO_ID: uuid(),
      PROJ_ID: activeJob.PROJ_ID, POINT_ID: activeJob.POINT_ID,
      mode: geoMode, description: desc,
      top: topVal, base: baseVal,
      material: geoMode==="soil" ? soilState.major||"" : rockState.rockname||rockState.rockname_custom||"",
      created_at: new Date().toISOString(), sync_status:"pending",
      snapshot: JSON.stringify(geoMode==="soil" ? soilState : rockState),
    };
    await dbPut("geology", record);
    const nextTop = parseFloat(baseVal).toFixed(2);
    if (geoMode==="soil") setSoilState({...GEO_SOIL_INIT, top:nextTop});
    else setRockState({...GEO_ROCK_INIT, r_top:nextTop});
    if (formScrollRef.current) formScrollRef.current.scrollTop = 0;
    await loadRecords();
    showToast("Saved ✓");
  };

  const handleDelete  = async id => { await dbDelete("geology",id); await loadRecords(); };
  const handleReload  = record => {
    if (!record.snapshot) { showToast("No snapshot"); return; }
    try {
      const snap = JSON.parse(record.snapshot);
      const nextTop = parseFloat(record.base||record.top||0).toFixed(2);
      if (record.mode==="soil") { setSoilState({...snap,top:nextTop,base:""}); setGeoMode("soil"); }
      else { setRockState({...snap,r_top:nextTop,r_base:""}); setGeoMode("rock"); }
      setGeoTab("entry");
      if (formScrollRef.current) formScrollRef.current.scrollTop = 0;
      showToast("Loaded — update depth and save");
    } catch(e) { showToast("Could not reload"); }
  };

  const handleClearAllConfirmed = async () => {
    setConfirmClr(false);
    const all = await dbGetAll("geology");
    await Promise.all(
      all.filter(r=>r.PROJ_ID===activeJob.PROJ_ID&&r.POINT_ID===activeJob.POINT_ID)
         .map(r=>dbDelete("geology",r.id))
    );
    await loadRecords();
    showToast("History cleared");
  };

  if (!activeJob) return null;

  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
      {/* Sub-header */}
      <div style={{ background:T.white, borderBottom:`1px solid ${T.border}`,
        flexShrink:0, boxShadow:"0 1px 4px rgba(0,0,0,0.06)" }}>
        <div style={{ display:"flex", alignItems:"center", gap:8, padding:"8px 12px 6px" }}>
          <div style={{ display:"flex", background:T.surface2, borderRadius:10,
            padding:3, border:`1px solid ${T.border}` }}>
            {[["soil","SOIL",T.accent],["rock","ROCK",T.rock]].map(([m,l,col])=>(
              <button key={m} onClick={()=>setGeoMode(m)} style={{
                padding:"6px 14px", borderRadius:8,
                background:geoMode===m?col:"transparent",
                color:geoMode===m?T.white:T.dim,
                border:"none", fontFamily:T.sans, fontSize:13, fontWeight:700,
                cursor:"pointer", WebkitTapHighlightColor:"transparent" }}>{l}</button>
            ))}
          </div>
          <div style={{ marginLeft:"auto" }}>
            {geoTab==="entry" ? (
              <button onClick={()=>{ geoMode==="soil"?setSoilState(GEO_SOIL_INIT):setRockState(GEO_ROCK_INIT); if(formScrollRef.current)formScrollRef.current.scrollTop=0; }}
                style={{ padding:"6px 12px", borderRadius:8, background:"transparent",
                  border:`1.5px solid ${T.border2}`, fontFamily:T.sans,
                  fontSize:12, fontWeight:600, color:T.dim, cursor:"pointer" }}>Clear</button>
            ) : confirmClr ? (
              <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                <span style={{ fontFamily:T.sans, fontSize:12, color:T.red, fontWeight:600 }}>Sure?</span>
                <button onClick={handleClearAllConfirmed} style={{ padding:"5px 10px", borderRadius:7,
                  background:T.red, border:"none", fontFamily:T.sans, fontSize:12,
                  fontWeight:700, color:T.white, cursor:"pointer" }}>Yes</button>
                <button onClick={()=>setConfirmClr(false)} style={{ padding:"5px 10px", borderRadius:7,
                  background:"transparent", border:`1.5px solid ${T.border2}`,
                  fontFamily:T.sans, fontSize:12, fontWeight:600, color:T.dim, cursor:"pointer" }}>Cancel</button>
              </div>
            ) : (
              <button onClick={()=>setConfirmClr(true)} style={{ padding:"6px 12px", borderRadius:8,
                background:"transparent", border:`1.5px solid ${T.red}`,
                fontFamily:T.sans, fontSize:12, fontWeight:600, color:T.red, cursor:"pointer" }}>Clear All</button>
            )}
          </div>
        </div>
        <div style={{ display:"flex" }}>
          {[["entry","Entry"],["history",`History (${records.length})`]].map(([id,label])=>{
            const active=geoTab===id;
            return (
              <button key={id} onClick={()=>{setGeoTab(id);setConfirmClr(false);}} style={{
                flex:1, padding:"9px 0", background:active?T.white:"transparent",
                border:"none", fontFamily:T.sans, fontSize:14,
                fontWeight:active?700:500, color:active?T.text:T.dim,
                cursor:"pointer", borderRadius:active?"8px 8px 0 0":0,
                borderTop:`3px solid ${active?accent:"transparent"}`,
                WebkitTapHighlightColor:"transparent" }}>{label}</button>
            );
          })}
        </div>
      </div>

      {/* Preview */}
      {geoTab==="entry" && (
        <div style={{ flexShrink:0, background:T.white,
          borderBottom:`1px solid ${T.border}`, boxShadow:"0 2px 6px rgba(0,0,0,0.06)" }}>
          <div style={{ margin:"8px 12px", border:`1.5px solid ${accent}`,
            borderRadius:10, background:T.white, overflow:"hidden" }}>
            <div style={{ background:accent, color:T.white, fontFamily:T.sans,
              fontSize:11, fontWeight:700, letterSpacing:"0.1em", padding:"6px 12px",
              display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              DESCRIPTION PREVIEW
              <button onClick={()=>desc&&navigator.clipboard.writeText(desc).then(()=>showToast("Copied"))}
                style={{ background:"rgba(255,255,255,0.2)", border:"none", borderRadius:4,
                  color:T.white, fontFamily:T.sans, fontSize:11, fontWeight:700,
                  padding:"2px 8px", cursor:"pointer" }}>COPY</button>
            </div>
            <div style={{ padding:"9px 12px", fontFamily:T.sans, fontSize:14,
              lineHeight:1.65, color:desc?T.text:T.dim,
              fontStyle:desc?"normal":"italic", minHeight:40 }}>
              {desc||"Select material type to begin…"}
            </div>
          </div>
        </div>
      )}

      {geoTab==="entry" && (
        <div ref={formScrollRef} style={{ flex:1, overflowY:"auto", paddingBottom:24 }}>
          {geoMode==="soil"
            ? <SoilForm state={soilState} dispatch={dispatchSoil}/>
            : <RockForm state={rockState} dispatch={dispatchRock}
                onResidualSoil={()=>{setGeoMode("soil");showToast("Residual soil — describe as soil");}}/>
          }
          <div style={{ padding:"8px 12px 0" }}>
            <button onClick={handleSave} style={{ width:"100%", padding:16,
              background:accent, color:T.white, border:"none", borderRadius:12,
              fontFamily:T.sans, fontSize:16, fontWeight:700, cursor:"pointer",
              boxShadow:`0 4px 12px ${accent}44`,
              WebkitTapHighlightColor:"transparent" }}>Save Record</button>
          </div>
        </div>
      )}

      {geoTab==="history" && (
        <div style={{ flex:1, overflowY:"auto" }}>
          <HistoryScreen records={records} onDelete={handleDelete} onReload={handleReload}/>
        </div>
      )}
    </div>
  );
}

// SPT MODULE — Standard Penetration Test
// ═══════════════════════════════════════════════════════════════════════

const SPT_CFG = { incrMm:75, seatCount:2, total:6, hardLimit:60, colour:T.blue };

function SPTHistoryScreen({ records, onDelete }) {
  if (!records.length) return (
    <div style={{ textAlign:"center", padding:"60px 24px",
      color:T.dim, fontFamily:T.sans, fontSize:15, lineHeight:1.8 }}>
      No SPT records yet for this borehole.
    </div>
  );
  return (
    <div style={{ padding:"8px 0 40px" }}>
      {records.map(r => {
        const date = new Date(r.created_at).toLocaleString("en-NZ",
          { day:"2-digit", month:"short", hour:"2-digit", minute:"2-digit" });
        return (
          <div key={r.id} style={{ background:T.surface, margin:"0 12px 10px",
            borderRadius:12, boxShadow:T.shadow,
            borderLeft:`4px solid ${T.blue}`, overflow:"hidden" }}>
            <div style={{ display:"flex", alignItems:"center", gap:8,
              padding:"10px 14px 8px", borderBottom:`1px solid ${T.border}` }}>
              <span style={{ background:T.blue, color:T.white, fontFamily:T.sans,
                fontSize:10, fontWeight:700, padding:"3px 9px", borderRadius:6,
                letterSpacing:"0.08em" }}>SPT</span>
              <span style={{ fontFamily:T.sans, fontSize:14, fontWeight:700, color:T.blue }}>
                {parseFloat(r.top||0).toFixed(2)}m</span>
              {r.refusal
                ? <span style={{ fontFamily:T.sans, fontSize:13, fontWeight:800, color:T.red }}>REFUSAL 60+</span>
                : <span style={{ fontFamily:T.sans, fontSize:18, fontWeight:800, color:T.blue }}>N = {r.nValue}</span>
              }
              <span style={{ fontFamily:T.sans, fontSize:11, color:T.dim, marginLeft:"auto" }}>{date}</span>
              <button onClick={()=>onDelete(r.id)} style={{ background:"none", border:"none",
                color:T.dim, fontSize:20, cursor:"pointer", padding:"0 2px" }}>×</button>
            </div>
            <div style={{ padding:"8px 14px 10px", display:"flex", gap:12, flexWrap:"wrap" }}>
              {["S1","S2","T1","T2","T3","T4"].map((label,idx) => {
                const isSeat = idx < SPT_CFG.seatCount;
                const blow   = r.blows?.[idx];
                const pen    = r.penetration?.[idx] || 75;
                return (
                  <div key={label} style={{ textAlign:"center", minWidth:30 }}>
                    <div style={{ fontFamily:T.sans, fontSize:10, fontWeight:700,
                      color:isSeat?T.dim:T.blue, marginBottom:2 }}>{label}</div>
                    <div style={{ fontFamily:T.sans, fontSize:16, fontWeight:700,
                      color:blow==null?T.border2:isSeat?T.dim:T.blue }}>
                      {blow!=null?blow:"—"}</div>
                    {pen < 75 && blow!=null && (
                      <div style={{ fontFamily:T.sans, fontSize:9, color:T.red }}>{pen}mm</div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function SPTTestScreen({ state, setState, onSave, showToast }) {
  const [micMode,     setMicMode]     = useState(false);
  const [sensitivity, setSensitivity] = useState(5.0);
  const [pendingBlows,setPendingBlows]= useState(0);
  const [refusalMm,   setRefusalMm]   = useState("");
  const [refusalErr,  setRefusalErr]  = useState("");
  const audioRef = useRef(null);
  const micRef   = useRef(null);
  const lastBlow = useRef(0);
  const bgRms    = useRef(null);

  const cfg  = SPT_CFG;
  const s    = state;
  const seat = cfg.seatCount;
  const i    = s.currentIncr;

  const getCumulative = useCallback((ab) => {
    const blows = s.blows;
    if (i < seat) return blows.slice(0,i).reduce((a,b)=>a+b,0) + ab;
    return blows.slice(seat,i).reduce((a,b)=>a+b,0) + ab;
  }, [s.blows, i, seat]);

  const getLiveN = useCallback((ab) => {
    if (i < seat) return s.blows.slice(0,i).reduce((a,b)=>a+b,0) + ab;
    return s.blows.slice(seat,i).reduce((a,b)=>a+b,0) + ab;
  }, [s.blows, i, seat]);

  const registerBlow = useCallback(() => {
    if (s.refusal || s.complete) return;
    setState(prev => {
      const blows = [...prev.blows];
      const pens  = [...prev.penetration];
      while (blows.length <= prev.currentIncr) { blows.push(0); pens.push(cfg.incrMm); }
      blows[prev.currentIncr] += 1;
      const ci  = prev.currentIncr;
      const ab  = blows[ci];
      let cum;
      if (ci < seat) cum = blows.slice(0,ci).reduce((a,b)=>a+b,0) + ab;
      else            cum = blows.slice(seat,ci).reduce((a,b)=>a+b,0) + ab;
      if (cum >= cfg.hardLimit) {
        return {...prev, blows, penetration:pens, refusal:true, refusalIncr:ci+1};
      }
      return {...prev, blows, penetration:pens};
    });
  }, [s.refusal, s.complete, seat, cfg]);

  // Drain pending blows one at a time
  useEffect(() => {
    if (pendingBlows <= 0) return;
    if (s.refusal || s.complete) { setPendingBlows(0); return; }
    const t = setTimeout(() => { registerBlow(); setPendingBlows(p=>Math.max(0,p-1)); }, 0);
    return () => clearTimeout(t);
  }, [pendingBlows, s.refusal, s.complete, registerBlow]);

  const startMic = async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
      const ctx = new (window.AudioContext||window.webkitAudioContext)({sampleRate:44100});
      if (ctx.state==="suspended") await ctx.resume();
      const src  = ctx.createMediaStreamSource(stream);
      const proc = ctx.createScriptProcessor(2048,1,1);
      proc.onaudioprocess = e => {
        if (!micRef.current) return;
        const buf = e.inputBuffer.getChannelData(0);
        let sum=0; for(let k=0;k<buf.length;k++) sum+=buf[k]*buf[k];
        const rms = Math.sqrt(sum/buf.length);
        if (bgRms.current===null) { bgRms.current=rms; return; }
        const thr = Math.max(bgRms.current * sensitivity, 0.002);
        const now = performance.now();
        if (rms>thr && (now-lastBlow.current)>500) {
          lastBlow.current=now; setPendingBlows(p=>p+1);
        } else { bgRms.current = bgRms.current*0.95 + rms*0.05; }
      };
      src.connect(proc); proc.connect(ctx.destination);
      audioRef.current={ctx,proc,src,stream}; micRef.current=true; bgRms.current=null;
      setMicMode(true);
    } catch(e) { showToast("Microphone error"); }
  };

  const stopMic = () => {
    micRef.current=false;
    if (audioRef.current) {
      try { audioRef.current.proc.disconnect(); audioRef.current.src.disconnect();
            audioRef.current.ctx.close(); audioRef.current.stream.getTracks().forEach(t=>t.stop()); }
      catch(e) {}
      audioRef.current=null;
    }
    setMicMode(false);
  };
  useEffect(()=>()=>stopMic(),[]);

  const nextIncrement = () => {
    if (s.refusal||s.complete) return;
    setState(prev => {
      const blows=[...prev.blows]; const pens=[...prev.penetration];
      while(blows.length<=prev.currentIncr){blows.push(0);pens.push(cfg.incrMm);}
      const next = prev.currentIncr+1;
      if (next >= cfg.total) return {...prev,blows,penetration:pens,currentIncr:next,complete:true};
      return {...prev,blows,penetration:pens,currentIncr:next};
    });
  };

  const handleRefusalConfirm = () => {
    const mm = parseInt(refusalMm);
    if (!mm||mm<1||mm>75) { setRefusalErr("Enter 1–75mm"); return; }
    setState(prev => {
      const pens=[...prev.penetration];
      while(pens.length<=prev.refusalIncr-1) pens.push(cfg.incrMm);
      pens[prev.refusalIncr-1]=mm;
      return {...prev,penetration:pens};
    });
    stopMic();
  };

  const activeBlows = s.blows[i]||0;
  const cumulative  = getCumulative(activeBlows);
  const liveN       = getLiveN(activeBlows);
  const ratio       = cumulative/cfg.hardLimit;
  const blowColor   = ratio>=0.83?T.red:ratio>=0.67?T.amber:T.text;
  const barColor    = ratio>=0.83?T.red:ratio>=0.5?T.amber:T.blue;
  const isFinished  = s.complete||s.refusal;
  // Show refusal modal when refusal triggered but mm not yet entered
  const showRefusalModal = s.refusal && (s.penetration[s.refusalIncr-1]||75)===75;

  return (
    <div style={{ flex:1, display:"flex", flexDirection:"column",
      overflow:"hidden", position:"relative" }}>

      {/* Increment dots + live N */}
      <div style={{ display:"flex", alignItems:"center", padding:"8px 14px 6px",
        background:T.white, borderBottom:`1px solid ${T.border}`, flexShrink:0, gap:5 }}>
        {Array.from({length:cfg.total}).map((_,d) => {
          const isSeat=d<seat; const done=d<i&&!isFinished||(isFinished&&d<s.blows.length);
          const active=d===i&&!isFinished;
          const bg    = done?(isSeat?T.dim:T.blue):"transparent";
          const bdr   = done?"none":active?(isSeat?T.dim:T.blue):T.border;
          const col   = done?T.white:active?(isSeat?T.dim:T.blue):T.border2;
          return (
            <div key={d} style={{ display:"flex",flexDirection:"column",alignItems:"center",gap:2 }}>
              <div style={{ width:30,height:30,borderRadius:"50%",background:bg,
                border:`2px solid ${bdr}`,display:"flex",alignItems:"center",
                justifyContent:"center",fontFamily:T.sans,fontSize:11,fontWeight:700,color:col }}>
                {d<seat?`S${d+1}`:`T${d-seat+1}`}
              </div>
              {(done||active)&&s.blows[d]!=null&&(
                <div style={{ fontFamily:T.sans,fontSize:9,color:T.dim }}>{s.blows[d]}</div>
              )}
            </div>
          );
        })}
        <div style={{ marginLeft:"auto", textAlign:"right" }}>
          <div style={{ fontFamily:T.sans,fontSize:9,color:T.dim,letterSpacing:"0.08em" }}>
            {i<seat?"SEATING":"N VALUE"}</div>
          <div style={{ fontFamily:T.sans,fontSize:22,fontWeight:800,lineHeight:1,
            color:s.refusal?T.red:i<seat?T.dim:T.blue }}>
            {s.refusal?"60+":liveN}</div>
        </div>
      </div>

      {/* Counter area */}
      <div style={{ flex:1,display:"flex",flexDirection:"column",
        alignItems:"center",justifyContent:"center",
        background:T.surface2,padding:16,gap:8 }}>
        <div style={{ fontFamily:T.sans,fontSize:11,color:T.dim,letterSpacing:"0.15em" }}>
          BLOWS / {cfg.incrMm}mm — {i<seat?`SEATING ${i+1}`:`TEST ${i-seat+1}`}
        </div>
        <div style={{ fontFamily:T.sans,fontWeight:800,color:blowColor,lineHeight:1,
          fontSize:"clamp(80px,22vw,130px)" }}>
          {s.refusal?"60":activeBlows}
        </div>
        <div style={{ width:"75%",height:6,background:T.border,borderRadius:3,overflow:"hidden" }}>
          <div style={{ height:"100%",borderRadius:3,background:barColor,
            width:`${Math.min(100,ratio*100)}%`,transition:"width 0.1s" }}/>
        </div>
        {micMode&&(
          <div style={{ display:"flex",alignItems:"center",gap:10,marginTop:4 }}>
            <span style={{ fontFamily:T.sans,fontSize:11,color:T.dim }}>Less</span>
            <input type="range" min="2" max="12" step="0.5" value={sensitivity}
              onChange={e=>setSensitivity(+e.target.value)} style={{ width:120 }}/>
            <span style={{ fontFamily:T.sans,fontSize:11,color:T.dim }}>More</span>
          </div>
        )}
      </div>

      {/* Refusal modal */}
      {showRefusalModal&&(
        <div style={{ position:"absolute",inset:0,background:"rgba(0,0,0,0.72)",
          display:"flex",alignItems:"center",justifyContent:"center",
          padding:20,zIndex:10 }}>
          <div style={{ background:T.white,borderRadius:12,padding:24,
            width:"100%",maxWidth:340,border:`2px solid ${T.red}`,textAlign:"center" }}>
            <div style={{ fontFamily:T.sans,fontSize:24,fontWeight:800,
              color:T.red,marginBottom:6 }}>⚠ REFUSAL</div>
            <div style={{ fontFamily:T.sans,fontSize:13,color:T.dim,
              marginBottom:16,lineHeight:1.5 }}>
              60 blows reached. Enter actual penetration achieved (mm):</div>
            <input type="number" value={refusalMm}
              onChange={e=>{setRefusalMm(e.target.value);setRefusalErr("");}}
              placeholder="mm" min="1" max="75" inputMode="numeric"
              style={{ width:"100%",background:T.surface2,border:`2px solid ${T.red}`,
                borderRadius:8,color:T.red,fontFamily:T.sans,fontSize:32,fontWeight:700,
                padding:12,textAlign:"center",outline:"none",marginBottom:8 }}/>
            {refusalErr&&(
              <div style={{ fontFamily:T.sans,fontSize:12,color:T.amber,marginBottom:8 }}>
                {refusalErr}</div>
            )}
            <button onClick={handleRefusalConfirm} style={{ width:"100%",padding:16,
              background:T.red,border:"none",borderRadius:8,fontFamily:T.sans,
              fontSize:16,fontWeight:700,color:T.white,cursor:"pointer" }}>
              Confirm ✓</button>
          </div>
        </div>
      )}

      {/* Controls */}
      <div style={{ flexShrink:0,padding:"10px 12px",background:T.white,
        borderTop:`1px solid ${T.border}`,display:"flex",flexDirection:"column",gap:8 }}>
        {isFinished ? (
          <button onClick={onSave} style={{ width:"100%",padding:16,background:T.blue,
            color:T.white,border:"none",borderRadius:12,fontFamily:T.sans,
            fontSize:16,fontWeight:700,cursor:"pointer",
            boxShadow:`0 4px 12px ${T.blue}44`,
            WebkitTapHighlightColor:"transparent" }}>Save Test ✓</button>
        ) : <>
          {!micMode&&(
            <button onPointerDown={registerBlow} style={{ width:"100%",padding:18,
              background:T.surface2,color:T.text,border:`2px solid ${T.border}`,
              borderRadius:12,fontFamily:T.sans,fontSize:16,fontWeight:700,
              cursor:"pointer",WebkitTapHighlightColor:"transparent" }}>
              TAP TO COUNT BLOW</button>
          )}
          <div style={{ display:"flex",gap:8 }}>
            <button onClick={()=>micMode?stopMic():startMic()} style={{ flex:1,padding:13,
              background:micMode?T.blue:"transparent",color:micMode?T.white:T.dim,
              border:`1.5px solid ${micMode?T.blue:T.border2}`,borderRadius:10,
              fontFamily:T.sans,fontSize:13,fontWeight:700,cursor:"pointer",
              WebkitTapHighlightColor:"transparent" }}>
              {micMode?"🎤 MIC ON":"MIC OFF"}</button>
            <button onClick={nextIncrement} style={{ flex:2,padding:13,
              background:i>=cfg.total-1?T.amber:T.blue,color:T.white,border:"none",
              borderRadius:10,fontFamily:T.sans,fontSize:14,fontWeight:700,
              cursor:"pointer",WebkitTapHighlightColor:"transparent" }}>
              {i>=cfg.total-1?"FINISH TEST ✓":"NEXT INCREMENT ▶"}</button>
          </div>
        </>}
      </div>
    </div>
  );
}

function SPTModule({ activeJob, showToast }) {
  const [sptTab,    setSptTab]    = useState("setup");
  const [topDepth,  setTopDepth]  = useState("1.50");
  const [testState, setTestState] = useState({ top:"1.50", blows:[], penetration:[],
    currentIncr:0, refusal:false, refusalIncr:null, complete:false });
  const [records,   setRecords]   = useState([]);

  const loadRecords = useCallback(async () => {
    if (!activeJob) return;
    const all = await dbGetAll("spt");
    setRecords(all
      .filter(r=>r.PROJ_ID===activeJob.PROJ_ID&&r.POINT_ID===activeJob.POINT_ID)
      .sort((a,b)=>parseFloat(a.top||0)-parseFloat(b.top||0)));
  }, [activeJob]);

  useEffect(()=>{ loadRecords(); },[loadRecords]);

  const startTest = () => {
    setTestState({ top:topDepth, blows:[], penetration:[],
      currentIncr:0, refusal:false, refusalIncr:null, complete:false });
    setSptTab("test");
  };

  const handleSaveTest = async () => {
    const s    = testState;
    const seat = SPT_CFG.seatCount;
    const testBlows = s.blows.slice(seat);
    const nValue    = s.refusal ? null : testBlows.reduce((a,b)=>a+b,0);
    const totalPen  = s.penetration.reduce((a,b)=>a+b,0);
    const record = {
      id:`spt_${Date.now()}`, GEO_ID:uuid(),
      PROJ_ID:activeJob.PROJ_ID, POINT_ID:activeJob.POINT_ID,
      top:s.top, Base:parseFloat(s.top)+totalPen/1000,
      nValue, refusal:s.refusal?1:0, refusalIncr:s.refusalIncr,
      blows:s.blows, penetration:s.penetration,
      Blow1:s.blows[0]||null, Incr1:s.penetration[0]||75,
      Blow2:s.blows[1]||null, Incr2:s.penetration[1]||75,
      Blow3:s.blows[2]||null, Incr3:s.penetration[2]||75,
      Blow4:s.blows[3]||null, Incr4:s.penetration[3]||75,
      Blow5:s.blows[4]||null, Incr5:s.penetration[4]||75,
      Blow6:s.blows[5]||null, Incr6:s.penetration[5]||75,
      TotalBlowCount:s.blows.reduce((a,b)=>a+b,0),
      TotalPenetration:totalPen, Standard:"NZS4402",
      created_at:new Date().toISOString(), sync_status:"pending",
    };
    await dbPut("spt",record);
    await loadRecords();
    const nextTop = (parseFloat(s.top)+1.5).toFixed(2);
    setTopDepth(nextTop);
    setTestState({ top:nextTop, blows:[], penetration:[],
      currentIncr:0, refusal:false, refusalIncr:null, complete:false });
    setSptTab("setup");
    showToast(`Saved — N=${nValue??`REFUSAL`}`);
  };

  const handleDelete = async id => { await dbDelete("spt",id); await loadRecords(); };

  if (!activeJob) return null;

  return (
    <div style={{ flex:1,display:"flex",flexDirection:"column",overflow:"hidden" }}>
      {/* Sub-header */}
      <div style={{ background:T.white,borderBottom:`1px solid ${T.border}`,
        flexShrink:0,boxShadow:"0 1px 4px rgba(0,0,0,0.06)" }}>
        <div style={{ display:"flex" }}>
          {[["setup", sptTab==="test"?"◀ Test":"Setup"],
            ["history",`History (${records.length})`]].map(([id,label])=>{
            const active=sptTab===id||(sptTab==="test"&&id==="setup");
            return (
              <button key={id}
                onClick={()=>{ if(id==="setup"&&sptTab==="test") setSptTab("setup"); else setSptTab(id); }}
                style={{ flex:1,padding:"12px 0",background:active?T.white:"transparent",
                  border:"none",fontFamily:T.sans,fontSize:14,fontWeight:active?700:500,
                  color:active?T.text:T.dim,cursor:"pointer",
                  borderRadius:active?"8px 8px 0 0":0,
                  borderTop:`3px solid ${active?T.blue:"transparent"}`,
                  WebkitTapHighlightColor:"transparent" }}>{label}</button>
            );
          })}
        </div>
      </div>

      {sptTab==="setup"&&(
        <div style={{ flex:1,overflowY:"auto",paddingBottom:24 }}>
          <SectionLabel>Test Depth</SectionLabel>
          <Card>
            <CardSection last>
              <FieldLabel>Depth from (m)</FieldLabel>
              <input type="number" value={topDepth} step="0.5" min="0"
                onChange={e=>setTopDepth(e.target.value)}
                style={{ background:T.surface2,border:`1.5px solid ${T.border2}`,
                  borderRadius:8,color:T.text,fontFamily:T.sans,
                  fontSize:28,fontWeight:700,padding:"12px 16px",
                  textAlign:"center",outline:"none",width:160 }}/>
            </CardSection>
          </Card>
          <SectionLabel>Procedure</SectionLabel>
          <Card>
            <CardSection last>
              <div style={{ fontFamily:T.sans,fontSize:13,color:T.dim,lineHeight:1.9 }}>
                <b style={{ color:T.text }}>Standard:</b> NZS 4402<br/>
                <b style={{ color:T.text }}>Seating:</b> 2 × 75mm increments (S1, S2) — not counted<br/>
                <b style={{ color:T.text }}>Test drive:</b> 4 × 75mm increments (T1–T4)<br/>
                <b style={{ color:T.text }}>N value:</b> Sum of T1–T4 blows<br/>
                <b style={{ color:T.text }}>Refusal:</b> 60 cumulative blows → enter actual depth
              </div>
            </CardSection>
          </Card>
          {records.length>0&&(
            <div style={{ padding:"0 16px 8px",fontFamily:T.sans,fontSize:12,color:T.dim }}>
              Last test at {parseFloat(records[records.length-1]?.top||0).toFixed(2)}m —
              {" "}N={records[records.length-1]?.nValue??"REFUSAL"}
            </div>
          )}
          <div style={{ padding:"0 12px" }}>
            <button onClick={startTest} style={{ width:"100%",padding:18,
              background:T.blue,color:T.white,border:"none",borderRadius:12,
              fontFamily:T.sans,fontSize:17,fontWeight:700,cursor:"pointer",
              boxShadow:`0 4px 12px ${T.blue}44`,
              WebkitTapHighlightColor:"transparent" }}>Start SPT Test ▶</button>
          </div>
        </div>
      )}

      {sptTab==="test"&&(
        <div style={{ flex:1,display:"flex",flexDirection:"column",overflow:"hidden" }}>
          <SPTTestScreen state={testState} setState={setTestState}
            onSave={handleSaveTest} showToast={showToast}/>
        </div>
      )}

      {sptTab==="history"&&(
        <div style={{ flex:1,overflowY:"auto" }}>
          <SPTHistoryScreen records={records} onDelete={handleDelete}/>
        </div>
      )}
    </div>
  );
}
